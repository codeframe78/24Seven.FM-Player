name: Android CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Android build, test, and lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Validate app
        run: |
          chmod +x gradlew
          ./gradlew test lint assembleDebug --no-daemon --console=plain

  notify-discord:
    name: Post milestone update to Discord
    needs: build
    if: ${{ always() && vars.DISCORD_PROJECT_UPDATE != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Post configured milestone update
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_THREAD_ID: ${{ vars.DISCORD_THREAD_ID }}
          DISCORD_PROJECT_UPDATE: ${{ vars.DISCORD_PROJECT_UPDATE }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK_URL}" ]]; then
            echo "Discord webhook is not available; skipping notification."
            exit 0
          fi

          if [[ -z "${DISCORD_THREAD_ID}" ]]; then
            echo "Discord thread ID is not available; skipping notification."
            exit 0
          fi

          post_to_discord() {
            jq --null-input --arg content "$1" \
              '{content: $content, allowed_mentions: {parse: []}}' \
              | curl --fail-with-body --silent --show-error --retry 3 --retry-all-errors \
                  --header 'Content-Type: application/json' \
                  --data-binary @- \
                  --url-query 'wait=true' \
                  --url-query "thread_id=${DISCORD_THREAD_ID}" \
                  --output /dev/null \
                  "${DISCORD_WEBHOOK_URL}"
          }

          post_to_discord "${DISCORD_PROJECT_UPDATE}"

name: Privacy Pages

on:
  push:
    branches: [main]
    paths:
      - PRIVACY.md
      - privacy-site/**
      - .github/workflows/privacy-pages.yml
  pull_request:
    paths:
      - PRIVACY.md
      - privacy-site/**
      - .github/workflows/privacy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: privacy-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare the canonical privacy notice
        shell: bash
        run: |
          {
            printf '%s\n' '---' 'layout: default' 'title: Privacy notice' 'permalink: /' '---'
            cat PRIVACY.md
          } > privacy-site/index.md

      - name: Build privacy site with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./privacy-site
          destination: ./_site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy privacy site
        id: deployment
        uses: actions/deploy-pages@v4

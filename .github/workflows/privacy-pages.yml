name: Project Site

on:
  push:
    branches: [main]
    paths:
      - PRIVACY.md
      - privacy-site/**
      - docs/play-store-assets/**
      - scripts/prepare-project-site.sh
      - scripts/build-project-site.sh
      - scripts/prepare-pages-transition.sh
      - scripts/validate-project-site.py
      - scripts/validate-project-site.sh
      - scripts/validate-pages-transition.py
      - .github/workflows/privacy-pages.yml
  pull_request:
    paths:
      - PRIVACY.md
      - privacy-site/**
      - docs/play-store-assets/**
      - scripts/prepare-project-site.sh
      - scripts/build-project-site.sh
      - scripts/prepare-pages-transition.sh
      - scripts/validate-project-site.py
      - scripts/validate-project-site.sh
      - scripts/validate-pages-transition.py
      - .github/workflows/privacy-pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project-pages
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
      pages: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Prepare canonical privacy and project artwork
        run: ./scripts/prepare-project-site.sh

      - name: Build Pages site with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./privacy-site
          destination: ./_site

      - name: Validate dedicated-domain artifact
        run: |
          node --check privacy-site/assets/project.js
          node --check privacy-site/assets/theme-init.js
          python3 scripts/validate-project-site.py _site

      - name: Prepare temporary GitHub Pages transition
        run: ./scripts/prepare-pages-transition.sh _pages-transition

      - name: Validate GitHub Pages transition
        run: python3 scripts/validate-pages-transition.py _pages-transition

      - name: Upload approved transition artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./_pages-transition

  deploy:
    if: >-
      vars.PLAYER_PAGES_TRANSITION_APPROVED == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy temporary transition site
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

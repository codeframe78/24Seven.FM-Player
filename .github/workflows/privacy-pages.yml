name: Project Pages

on:
  push:
    branches: [main]
    paths:
      - PRIVACY.md
      - privacy-site/**
      - docs/play-store-assets/**
      - .github/workflows/privacy-pages.yml
  pull_request:
    paths:
      - PRIVACY.md
      - privacy-site/**
      - docs/play-store-assets/**
      - .github/workflows/privacy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: project-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Prepare the canonical privacy notice
        shell: bash
        run: |
          {
            printf '%s\n' '---' 'layout: default' 'title: Privacy notice' 'permalink: /' '---'
            cat PRIVACY.md
          } > privacy-site/index.md

      - name: Prepare project artwork
        shell: bash
        run: |
          mkdir -p privacy-site/assets/project/screenshots
          cp docs/play-store-assets/app-icon-512.png privacy-site/assets/project/app-icon.png
          cp docs/play-store-assets/feature-graphic-1024x500.png privacy-site/assets/project/feature-graphic.png
          cp docs/play-store-assets/screenshots/phone-player-live-playing.png privacy-site/assets/project/screenshots/player.png
          cp docs/play-store-assets/screenshots/phone-queue-live.png privacy-site/assets/project/screenshots/queue.png
          cp docs/play-store-assets/screenshots/phone-stations.png privacy-site/assets/project/screenshots/stations.png
          cp docs/play-store-assets/screenshots/phone-more.png privacy-site/assets/project/screenshots/more.png
          cp docs/play-store-assets/screenshots/tablet-landscape-player.png privacy-site/assets/project/screenshots/tablet.png

      - name: Build Pages site with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./privacy-site
          destination: ./_site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5

  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy privacy site
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

name: Firebase Test Lab

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-test-lab-${{ github.ref }}
  cancel-in-progress: false

jobs:
  instrumentation:
    name: Android instrumentation tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Build app and instrumentation APKs
        run: |
          chmod +x gradlew
          ./gradlew \
            :app:assembleDebug \
            :app:assembleDebugAndroidTest \
            --no-daemon \
            --console=plain

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TEST_LAB_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Run tests in Firebase Test Lab
        shell: bash
        run: |
          set -o pipefail
          gcloud firebase test android run \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --type=instrumentation \
            --app=app/build/outputs/apk/debug/app-debug.apk \
            --test=app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device=model=MediumPhone.arm,version=35,locale=en,orientation=portrait \
            --timeout=15m \
            --num-flaky-test-attempts=0 \
            --no-performance-metrics \
            --no-record-video \
            --results-history-name="24Seven.FM Player CI" \
            --quiet \
            2>&1 | tee firebase-test-lab.log

      - name: Upload APKs and Test Lab log
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firebase-test-lab-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
            firebase-test-lab.log
          if-no-files-found: warn
          retention-days: 7

workstreams:
  - id: M23.1
    name: Signed release candidate
    state: active
    state_label: In progress
    summary: Protected Linux AAB/APK signing and exact upload-certificate checks pass; Play version eligibility and delivered-install validation remain.
    evidence: docs/m23-release-candidate-audit.md
  - id: M23.2
    name: UGC safety and moderation
    state: waiting
    state_label: Waiting externally
    summary: Native age, Terms, reveal, report, and block safeguards pass; administrator receipt reconciliation remains.
    evidence: docs/m23-ugc-safety-validation.md
  - id: M23.3
    name: Android 16 and API 36
    state: done
    state_label: Complete
    summary: API 36 targeting, predictive Back, edge-to-edge behavior, and connected-device validation are complete.
    evidence: docs/m23-api36-readiness.md
  - id: M23.4
    name: Play review declarations
    state: waiting
    state_label: Waiting externally
    summary: Local declaration packet and notification-video rehearsal are prepared; protected reviewer inputs and Console submission remain.
    evidence: docs/m23-play-declaration-packet.md
  - id: M23.5
    name: Brand and content rights
    state: waiting
    state_label: Waiting externally
    summary: Authorization request and private evidence-handling packet are prepared; written rights-holder confirmation remains.
    evidence: docs/m23-owner-response-packet.md
  - id: M23.6
    name: Release device matrix
    state: active
    state_label: In progress
    summary: Local emulator, accessibility, network, performance, and Razr hinge checks pass; Play delivery, pre-launch, and spoken TalkBack remain.
    evidence: docs/m23-device-compatibility.md
  - id: M23.7
    name: Launcher and store polish
    state: done
    state_label: Complete
    summary: Density-specific legacy, adaptive, and Android 13 monochrome launcher resources are complete.
    evidence: docs/m23-launcher-polish.md

pre_alpha:
  - id: M24
    name: Sleep Timer
    state: planned
    state_label: Planned before Alpha
    summary: Add a service-owned timer with presets, a custom duration, visible remaining time, adjust and cancel actions, and deterministic expiry across pause, station changes, device sleep, and service recreation.
    evidence: docs/IMPLEMENTATION_PLAN.md
  - id: M25
    name: Cast / Audio-Output Selection
    state: planned
    state_label: Discovery first
    summary: Verify the permitted routing architecture, stream authorization, and dependency impact before adding supported Cast and/or dedicated output selection with explicit handoff and recovery behavior.
    evidence: docs/future-scope.md
  - id: M26
    name: In-App Diagnostics
    state: planned
    state_label: Planned before Alpha
    summary: Provide a deliberately generated, redacted support snapshot with app, device, station, bounded playback, network, and route state while excluding sessions, community content, private endpoints, and raw logs.
    evidence: docs/IMPLEMENTATION_PLAN.md
  - id: M27
    name: Community Push Notifications
    state: planned
    state_label: Discovery first
    summary: Add opt-in station-scoped true push for exact signed-in-name Chat mentions and, once M17 delivery works, new Private Messages, with separate controls, safe deep links, blocked-user filtering, and duplicate suppression.
    evidence: docs/future-scope.md
  - id: M28
    name: Alpha Publication
    state: planned
    state_label: Final pre-Alpha gate
    summary: Revalidate the changed release candidate and publish the explicitly authorized signed bundle to internal or closed testing only after M23–M27 have closed.
    evidence: docs/play-console-checklist.md

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <meta name="description" content="{{ site.description | escape }}">
    <title>{{ page.title | default: site.title | escape }} · 24Seven.FM Player</title>
    <link rel="stylesheet" href="{{ '/assets/privacy.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header">
      <div>
        <a class="brand" href="{{ '/project/' | relative_url }}">24Seven.FM Player</a>
        <p class="tagline">Unofficial, non-commercial native Android application</p>
      </div>
      <nav aria-label="Primary navigation">
        <a href="{{ '/project/' | relative_url }}">Project</a>
        <a aria-current="page" href="{{ '/' | relative_url }}">Privacy</a>
        <a href="https://github.com/codeframe78/24Seven.FM-Player">GitHub</a>
      </nav>
    </header>
    <main id="main-content">
      {{ content }}
    </main>
    <footer>
      <p>24Seven.FM Player is an independent community project.</p>
      <p><a href="{{ '/project/' | relative_url }}">Project site</a> · <a href="https://github.com/codeframe78/24Seven.FM-Player">Source and issue tracker</a></p>
    </footer>
  </body>
</html>
